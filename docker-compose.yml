networks:
  activie-network:
    external: true

services:
  authsvc:
    build: .
    image: authsvc:latest
    container_name: authsvc
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - activie-network
    environment:
      - DSN=${DSN}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - VAULT_ENV=${VAULT_ENV}
      - VAULT_ADDRESS=${VAULT_ADDRESS}
      - VAULT_TOKEN=${VAULT_TOKEN}
    volumes:
      - ./.env:/app/.env
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
